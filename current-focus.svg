<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @keyframes twinkle1 { 0%,100%{opacity:1} 50%{opacity:0.2} }
    @keyframes twinkle2 { 0%,100%{opacity:0.5} 50%{opacity:1} }
    @keyframes twinkle3 { 0%,100%{opacity:0.8} 40%{opacity:0.1} }
    @keyframes pulse { 0%,100%{opacity:0.15} 50%{opacity:0.35} }
    @keyframes pulse2 { 0%,100%{opacity:0.1} 50%{opacity:0.28} }
    @keyframes rowtitle { from{opacity:0;transform:translateX(-20px)} to{opacity:1;transform:translateX(0)} }
    @keyframes rowdesc { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
    @keyframes glowline { 0%,100%{opacity:0.3} 50%{opacity:0.8} }
    @keyframes floaticon { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
    @keyframes scanline { 0%{transform:translateY(-10px);opacity:0} 10%{opacity:0.6} 90%{opacity:0.6} 100%{transform:translateY(420px);opacity:0} }
    @keyframes borderflow { 0%{stroke-dashoffset:0} 100%{stroke-dashoffset:-200} }
    @keyframes headerglow { 0%,100%{opacity:0.7} 50%{opacity:1} }
    .s1{animation:twinkle1 2.8s 0.2s infinite}
    .s2{animation:twinkle2 3.5s 0.7s infinite}
    .s3{animation:twinkle3 2.2s 1.1s infinite}
    .s4{animation:twinkle1 4s 0.4s infinite}
    .s5{animation:twinkle2 2.6s 1.5s infinite}
    .s6{animation:twinkle3 3.8s 0.9s infinite}
    .s7{animation:twinkle1 3.2s 0.3s infinite}
    .s8{animation:twinkle2 2.9s 1.8s infinite}
    .n1{animation:pulse 5s ease-in-out infinite}
    .n2{animation:pulse2 7s 1s ease-in-out infinite}
    .n3{animation:pulse 6s 3s ease-in-out infinite}
    .row1 .rtitle{animation:rowtitle 0.7s 0.3s both}
    .row1 .rdesc{animation:rowdesc 0.7s 0.5s both}
    .row2 .rtitle{animation:rowtitle 0.7s 0.6s both}
    .row2 .rdesc{animation:rowdesc 0.7s 0.8s both}
    .row3 .rtitle{animation:rowtitle 0.7s 0.9s both}
    .row3 .rdesc{animation:rowdesc 0.7s 1.1s both}
    .row4 .rtitle{animation:rowtitle 0.7s 1.2s both}
    .row4 .rdesc{animation:rowdesc 0.7s 1.4s both}
    .row5 .rtitle{animation:rowtitle 0.7s 1.5s both}
    .row5 .rdesc{animation:rowdesc 0.7s 1.7s both}
    .gl{animation:glowline 3s ease-in-out infinite}
    .fi1{animation:floaticon 3s 0s ease-in-out infinite}
    .fi2{animation:floaticon 3s 0.4s ease-in-out infinite}
    .fi3{animation:floaticon 3s 0.8s ease-in-out infinite}
    .fi4{animation:floaticon 3s 1.2s ease-in-out infinite}
    .fi5{animation:floaticon 3s 1.6s ease-in-out infinite}
    .scan{animation:scanline 8s 2s linear infinite}
    .border-anim{animation:borderflow 3s linear infinite}
    .hglow{animation:headerglow 2s ease-in-out infinite}
  </style>
  <radialGradient id="bg" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="#0a0020"/>
    <stop offset="100%" stop-color="#000008"/>
  </radialGradient>
  <radialGradient id="neb1" cx="20%" cy="30%" r="40%">
    <stop offset="0%" stop-color="#7c3aed" stop-opacity="1"/>
    <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="neb2" cx="80%" cy="70%" r="40%">
    <stop offset="0%" stop-color="#1d4ed8" stop-opacity="1"/>
    <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="neb3" cx="60%" cy="20%" r="30%">
    <stop offset="0%" stop-color="#be185d" stop-opacity="1"/>
    <stop offset="100%" stop-color="#be185d" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="rowbg1" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="rowbg2" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#1d4ed8" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="rowbg3" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#be185d" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#be185d" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="rowbg4" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#0e7490" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#0e7490" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="rowbg5" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#047857" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#047857" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="titlegrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#a78bfa"/>
    <stop offset="50%" stop-color="#60a5fa"/>
    <stop offset="100%" stop-color="#f472b6"/>
  </linearGradient>
  <filter id="glow">
    <feGaussianBlur stdDeviation="2" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<rect width="800" height="420" fill="url(#bg)" rx="14"/>
<ellipse cx="160" cy="126" rx="220" ry="160" fill="url(#neb1)" class="n1"/>
<ellipse cx="640" cy="294" rx="200" ry="150" fill="url(#neb2)" class="n2"/>
<ellipse cx="480" cy="84" rx="180" ry="120" fill="url(#neb3)" class="n3"/>
<circle cx="30" cy="18" r="1.5" fill="white" class="s1"/>
<circle cx="95" cy="42" r="1" fill="white" class="s3"/>
<circle cx="180" cy="12" r="1.5" fill="white" class="s2"/>
<circle cx="260" cy="35" r="1" fill="white" class="s4"/>
<circle cx="340" cy="8" r="2" fill="white" class="s1"/>
<circle cx="420" cy="28" r="1" fill="white" class="s5"/>
<circle cx="500" cy="16" r="1.5" fill="white" class="s3"/>
<circle cx="580" cy="38" r="1" fill="white" class="s2"/>
<circle cx="660" cy="12" r="2" fill="white" class="s6"/>
<circle cx="730" cy="45" r="1" fill="white" class="s4"/>
<circle cx="770" cy="22" r="1.5" fill="white" class="s7"/>
<circle cx="55" cy="380" r="1" fill="white" class="s8"/>
<circle cx="140" cy="395" r="1.5" fill="white" class="s1"/>
<circle cx="700" cy="388" r="1" fill="white" class="s3"/>
<circle cx="755" cy="402" r="2" fill="white" class="s5"/>
<circle cx="620" cy="375" r="1" fill="white" class="s2"/>
<circle cx="22" cy="200" r="1" fill="white" class="s6"/>
<circle cx="778" cy="180" r="1.5" fill="white" class="s4"/>
<circle cx="15" cy="310" r="1" fill="white" class="s7"/>
<circle cx="785" cy="300" r="1" fill="white" class="s8"/>
<rect x="0" y="0" width="800" height="3" fill="rgba(139,92,246,0.15)" rx="1" class="scan"/>
<rect x="1" y="1" width="798" height="418" fill="none" stroke="#7c3aed" stroke-width="1.5" rx="14" stroke-dasharray="100,50" stroke-opacity="0.5" class="border-anim"/>
<rect x="20" y="16" width="760" height="52" fill="rgba(139,92,246,0.08)" rx="8"/>
<line x1="20" y1="68" x2="780" y2="68" stroke="#7c3aed" stroke-width="0.5" stroke-opacity="0.5" class="gl"/>
<text x="400" y="34" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" fill="#8b5cf6" letter-spacing="5" class="hglow">&#9672; MISSION PARAMETERS &#9672;</text>
<text x="400" y="56" text-anchor="middle" font-family="'Courier New',monospace" font-size="20" font-weight="bold" fill="url(#titlegrad)" filter="url(#glow)" class="hglow">&#127919;  Current Focus</text>
<circle cx="200" cy="62" r="2" fill="#7c3aed" opacity="0.6"/>
<circle cx="400" cy="62" r="2" fill="#60a5fa" opacity="0.6"/>
<circle cx="600" cy="62" r="2" fill="#f472b6" opacity="0.6"/>
<g class="row1">
  <rect x="20" y="78" width="760" height="60" fill="url(#rowbg1)" rx="6"/>
  <rect x="20" y="78" width="3" height="60" fill="#8b5cf6" rx="2"/>
  <line x1="23" y1="138" x2="780" y2="138" stroke="#7c3aed" stroke-width="0.4" stroke-opacity="0.3"/>
  <text x="50" y="103" font-family="'Courier New',monospace" font-size="22" class="fi1">&#128279;</text>
  <text x="90" y="100" font-family="'Courier New',monospace" font-size="14" font-weight="bold" fill="#a78bfa" class="rtitle">RAG Systems</text>
  <text x="90" y="118" font-family="sans-serif" font-size="12" fill="#94a3b8" class="rdesc">Document Q&amp;A chatbots using LangChain + Vector DBs</text>
  <text x="750" y="112" font-family="'Courier New',monospace" font-size="10" fill="#7c3aed" text-anchor="end" opacity="0.7">[ ACTIVE ]</text>
</g>
