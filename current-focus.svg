  <rect x="20" y="142" width="760" height="60" fill="url(#rowbg2)" rx="6"/>
  <rect x="20" y="142" width="3" height="60" fill="#60a5fa" rx="2"/>
  <line x1="23" y1="202" x2="780" y2="202" stroke="#1d4ed8" stroke-width="0.4" stroke-opacity="0.3"/>
  <text x="50" y="167" font-family="'Courier New',monospace" font-size="22" class="fi2">&#129302;</text>
  <text x="90" y="164" font-family="'Courier New',monospace" font-size="14" font-weight="bold" fill="#60a5fa" class="rtitle">Agentic AI</text>
  <text x="90" y="182" font-family="sans-serif" font-size="12" fill="#94a3b8" class="rdesc">Multi-agent workflows with LangGraph &amp; CrewAI</text>
  <text x="750" y="176" font-family="'Courier New',monospace" font-size="10" fill="#3b82f6" text-anchor="end" opacity="0.7">[ BUILDING ]</text>
</g>
<g class="row3">
  <rect x="20" y="206" width="760" height="60" fill="url(#rowbg3)" rx="6"/>
  <rect x="20" y="206" width="3" height="60" fill="#f472b6" rx="2"/>
  <line x1="23" y1="266" x2="780" y2="266" stroke="#be185d" stroke-width="0.4" stroke-opacity="0.3"/>
  <text x="50" y="231" font-family="'Courier New',monospace" font-size="22" class="fi3">&#129504;</text>
  <text x="90" y="228" font-family="'Courier New',monospace" font-size="14" font-weight="bold" fill="#f472b6" class="rtitle">NLP</text>
  <text x="90" y="246" font-family="sans-serif" font-size="12" fill="#94a3b8" class="rdesc">Text classification, summarisation &amp; Transformers</text>
  <text x="750" y="240" font-family="'Courier New',monospace" font-size="10" fill="#ec4899" text-anchor="end" opacity="0.7">[ MASTERING ]</text>
</g>
<g class="row4">
  <rect x="20" y="270" width="760" height="60" fill="url(#rowbg4)" rx="6"/>
  <rect x="20" y="270" width="3" height="60" fill="#22d3ee" rx="2"/>
  <line x1="23" y1="330" x2="780" y2="330" stroke="#0e7490" stroke-width="0.4" stroke-opacity="0.3"/>
  <text x="50" y="295" font-family="'Courier New',monospace" font-size="22" class="fi4">&#128065;&#65039;</text>
  <text x="90" y="292" font-family="'Courier New',monospace" font-size="14" font-weight="bold" fill="#22d3ee" class="rtitle">Computer Vision</text>
  <text x="90" y="310" font-family="sans-serif" font-size="12" fill="#94a3b8" class="rdesc">Image recognition &amp; object detection with PyTorch</text>
  <text x="750" y="304" font-family="'Courier New',monospace" font-size="10" fill="#06b6d4" text-anchor="end" opacity="0.7">[ EXPLORING ]</text>
</g>
<g class="row5">
  <rect x="20" y="334" width="760" height="60" fill="url(#rowbg5)" rx="6"/>
  <rect x="20" y="334" width="3" height="60" fill="#34d399" rx="2"/>
  <text x="50" y="359" font-family="'Courier New',monospace" font-size="22" class="fi5">&#128640;</text>
  <text x="90" y="356" font-family="'Courier New',monospace" font-size="14" font-weight="bold" fill="#34d399" class="rtitle">MLOps</text>
  <text x="90" y="374" font-family="sans-serif" font-size="12" fill="#94a3b8" class="rdesc">Model deployment with FastAPI, Docker &amp; AWS</text>
  <text x="750" y="368" font-family="'Courier New',monospace" font-size="10" fill="#10b981" text-anchor="end" opacity="0.7">[ DEPLOYING ]</text>
</g>
<text x="28" y="414" font-family="'Courier New',monospace" font-size="9" fill="#7c3aed" opacity="0.5">&#9698; SNEHAL.AI</text>
<text x="772" y="414" font-family="'Courier New',monospace" font-size="9" fill="#7c3aed" opacity="0.5" text-anchor="end">VIT.BHOPAL &#9699;</text>
</svg>
