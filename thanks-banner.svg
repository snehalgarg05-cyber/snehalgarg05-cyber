<svg width="800" height="120" viewBox="0 0 800 120" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @keyframes wave1 { 0%{d:path("M0,60 C200,20 400,100 800,40 L800,120 L0,120 Z")} 50%{d:path("M0,40 C200,100 400,20 800,60 L800,120 L0,120 Z")} 100%{d:path("M0,60 C200,20 400,100 800,40 L800,120 L0,120 Z")} }
    @keyframes wave2 { 0%{d:path("M0,70 C200,30 400,90 800,50 L800,120 L0,120 Z")} 50%{d:path("M0,50 C200,90 400,30 800,70 L800,120 L0,120 Z")} 100%{d:path("M0,70 C200,30 400,90 800,50 L800,120 L0,120 Z")} }
    @keyframes wave3 { 0%{d:path("M0,80 C200,40 400,80 800,60 L800,120 L0,120 Z")} 50%{d:path("M0,60 C200,80 400,40 800,80 L800,120 L0,120 Z")} 100%{d:path("M0,80 C200,40 400,80 800,60 L800,120 L0,120 Z")} }
    @keyframes textglow { 0%,100%{opacity:0.9} 50%{opacity:1} }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    @keyframes sparkle { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.5)} }
    .w1{animation:wave1 6s ease-in-out infinite}
    .w2{animation:wave2 8s ease-in-out infinite}
    .w3{animation:wave3 10s ease-in-out infinite}
    .ft{animation:float 3s ease-in-out infinite}
    .sp1{animation:sparkle 2s 0.2s infinite}
    .sp2{animation:sparkle 2.5s 0.8s infinite}
    .sp3{animation:sparkle 1.8s 1.4s infinite}
    .sp4{animation:sparkle 2.2s 0.5s infinite}
    .sp5{animation:sparkle 2.8s 1.1s infinite}
    .tg{animation:textglow 2s ease-in-out infinite}
  </style>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#0d1b4b"/>
    <stop offset="50%" stop-color="#1a0535"/>
    <stop offset="100%" stop-color="#0a4d3a"/>
  </linearGradient>
  <linearGradient id="wg1" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#1e3a8a" stop-opacity="0.8"/>
    <stop offset="100%" stop-color="#065f46" stop-opacity="0.8"/>
  </linearGradient>
  <linearGradient id="wg2" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#1e40af" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#047857" stop-opacity="0.6"/>
  </linearGradient>
  <linearGradient id="wg3" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#10b981" stop-opacity="0.4"/>
  </linearGradient>
  <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#60a5fa"/>
    <stop offset="50%" stop-color="#a78bfa"/>
    <stop offset="100%" stop-color="#34d399"/>
  </linearGradient>
  <filter id="glow">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- Background -->
<rect width="800" height="120" fill="url(#bg)"/>

<!-- Waves -->
<path d="M0,80 C200,40 400,80 800,60 L800,120 L0,120 Z" fill="url(#wg3)" class="w3"/>
<path d="M0,70 C200,30 400,90 800,50 L800,120 L0,120 Z" fill="url(#wg2)" class="w2"/>
<path d="M0,60 C200,20 400,100 800,40 L800,120 L0,120 Z" fill="url(#wg1)" class="w1"/>

<!-- Sparkles -->
<text x="80" y="40" font-size="16" class="sp1">✨</text>
<text x="220" y="28" font-size="11" class="sp2">⭐</text>
<text x="400" y="25" font-size="13" class="sp3">✨</text>
<text x="580" y="30" font-size="11" class="sp4">⭐</text>
<text x="710" y="38" font-size="16" class="sp5">✨</text>

<!-- Main text only -->
<g class="ft">
  <text x="400" y="72" text-anchor="middle" font-family="sans-serif" font-size="26" font-weight="bold" fill="url(#tg)" filter="url(#glow)" class="tg">Thanks for Visiting! 🤖🚀</text>
</g>
</svg>
