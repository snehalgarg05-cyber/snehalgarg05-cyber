<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @keyframes twinkle { 0%,100%{opacity:1;r:1.5} 50%{opacity:0.2;r:0.8} }
    @keyframes twinkle2 { 0%,100%{opacity:0.6;r:1} 50%{opacity:1;r:2} }
    @keyframes shootingstar { 0%{opacity:0;transform:translate(0,0)} 10%{opacity:1} 100%{opacity:0;transform:translate(-600px,300px)} }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    @keyframes float2 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    @keyframes nebula-pulse { 0%,100%{opacity:0.18} 50%{opacity:0.32} }
    @keyframes orbit { 0%{transform:rotate(0deg) translateX(90px) rotate(0deg)} 100%{transform:rotate(360deg) translateX(90px) rotate(-360deg)} }
    @keyframes orbit2 { 0%{transform:rotate(0deg) translateX(130px) rotate(0deg)} 100%{transform:rotate(360deg) translateX(130px) rotate(-360deg)} }
    @keyframes glow-pulse { 0%,100%{opacity:0.7} 50%{opacity:1} }
    @keyframes borderflow { 0%{stroke-dashoffset:0} 100%{stroke-dashoffset:-300} }
    @keyframes scanline { 0%{transform:translateY(-5px);opacity:0} 10%{opacity:0.4} 90%{opacity:0.4} 100%{transform:translateY(300px);opacity:0} }
    .tw1{animation:twinkle 3s 0.2s infinite}
    .tw2{animation:twinkle2 4s 0.7s infinite}
    .tw3{animation:twinkle 2.5s 1.1s infinite}
    .tw4{animation:twinkle2 3.5s 0.4s infinite}
    .tw5{animation:twinkle 4.2s 1.5s infinite}
    .tw6{animation:twinkle2 2.8s 0.9s infinite}
    .tw7{animation:twinkle 3.8s 0.3s infinite}
    .tw8{animation:twinkle2 3.2s 1.8s infinite}
    .tw9{animation:twinkle 2.2s 0.6s infinite}
    .tw10{animation:twinkle2 4.5s 1.2s infinite}
    .n1{animation:nebula-pulse 5s ease-in-out infinite}
    .n2{animation:nebula-pulse 7s 1s ease-in-out infinite}
    .n3{animation:nebula-pulse 6s 2s ease-in-out infinite}
    .p1{animation:float 6s ease-in-out infinite}
    .p2{animation:float2 8s ease-in-out infinite}
    .gp{animation:glow-pulse 2s ease-in-out infinite}
    .ba{animation:borderflow 4s linear infinite}
    .sc{animation:scanline 10s 1s linear infinite}
    .o1{animation:orbit 8s linear infinite;transform-origin:400px 154px}
    .o2{animation:orbit2 14s linear infinite;transform-origin:400px 154px}
  </style>
  <radialGradient id="gbg" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="#080018"/>
    <stop offset="100%" stop-color="#000008"/>
  </radialGradient>
  <radialGradient id="gn1" cx="25%" cy="35%" r="45%">
    <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="gn2" cx="75%" cy="65%" r="40%">
    <stop offset="0%" stop-color="#1d4ed8" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="gn3" cx="65%" cy="20%" r="35%">
    <stop offset="0%" stop-color="#be185d" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#be185d" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="pg1" cx="35%" cy="35%" r="65%">
    <stop offset="0%" stop-color="#a78bfa"/>
    <stop offset="100%" stop-color="#4c1d95"/>
  </radialGradient>
  <radialGradient id="pg2" cx="35%" cy="35%" r="65%">
    <stop offset="0%" stop-color="#60a5fa"/>
    <stop offset="100%" stop-color="#1e3a8a"/>
  </radialGradient>
  <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#a78bfa"/>
    <stop offset="50%" stop-color="#60a5fa"/>
    <stop offset="100%" stop-color="#f472b6"/>
  </linearGradient>
  <filter id="glow">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<rect width="800" height="300" fill="url(#gbg)" rx="14"/>
<ellipse cx="200" cy="105" rx="260" ry="180" fill="url(#gn1)" class="n1"/>
<ellipse cx="600" cy="195" rx="240" ry="170" fill="url(#gn2)" class="n2"/>
<ellipse cx="520" cy="60" rx="200" ry="130" fill="url(#gn3)" class="n3"/>
<rect x="0" y="0" width="800" height="2" fill="rgba(139,92,246,0.2)" rx="1" class="sc"/>
<rect x="1" y="1" width="798" height="298" fill="none" stroke="#7c3aed" stroke-width="1.5" rx="14" stroke-dasharray="120,60" stroke-opacity="0.5" class="ba"/>
<circle cx="45" cy="20" r="1.5" fill="white" class="tw1"/>
<circle cx="120" cy="55" r="1" fill="white" class="tw3"/>
<circle cx="200" cy="14" r="1.5" fill="white" class="tw2"/>
<circle cx="290" cy="38" r="1" fill="white" class="tw4"/>
<circle cx="370" cy="10" r="2" fill="white" class="tw1"/>
<circle cx="460" cy="28" r="1" fill="white" class="tw5"/>
<circle cx="530" cy="18" r="1.5" fill="white" class="tw3"/>
<circle cx="610" cy="42" r="1" fill="white" class="tw2"/>
<circle cx="680" cy="15" r="2" fill="white" class="tw6"/>
<circle cx="740" cy="48" r="1" fill="white" class="tw4"/>
<circle cx="775" cy="25" r="1.5" fill="white" class="tw7"/>
<circle cx="70" cy="260" r="1" fill="white" class="tw8"/>
<circle cx="150" cy="278" r="1.5" fill="white" class="tw1"/>
<circle cx="690" cy="265" r="1" fill="white" class="tw3"/>
<circle cx="748" cy="282" r="2" fill="white" class="tw5"/>
<circle cx="615" cy="255" r="1" fill="white" class="tw2"/>
<circle cx="18" cy="150" r="1" fill="white" class="tw6"/>
<circle cx="782" cy="140" r="1.5" fill="white" class="tw4"/>
<circle cx="12" cy="220" r="1" fill="white" class="tw7"/>
<circle cx="788" cy="210" r="1" fill="white" class="tw8"/>
<circle cx="35" cy="120" r="1.5" fill="white" class="tw9"/>
<circle cx="760" cy="100" r="1" fill="white" class="tw10"/>
<circle cx="25" cy="80" r="1" fill="white" class="tw2"/>
<circle cx="790" cy="170" r="1.5" fill="white" class="tw5"/>
<line x1="680" y1="25" x2="800" y2="25" stroke="white" stroke-width="1.5" stroke-linecap="round" style="animation:shootingstar 7s 0.5s linear infinite;transform-origin:680px 25px"/>
<line x1="520" y1="75" x2="640" y2="75" stroke="white" stroke-width="1" style="animation:shootingstar 5s 3s linear infinite;transform-origin:520px 75px;opacity:0.7"/>
<g class="p1">
  <circle cx="130" cy="155" r="42" fill="url(#pg1)"/>
  <ellipse cx="130" cy="155" rx="65" ry="15" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.5" transform="rotate(-20,130,155)"/>
  <circle cx="116" cy="142" r="8" fill="#7c3aed" opacity="0.6"/>
  <circle cx="145" cy="164" r="5" fill="#6d28d9" opacity="0.4"/>
</g>
<g class="p2">
  <circle cx="670" cy="190" r="32" fill="url(#pg2)"/>
  <ellipse cx="670" cy="190" rx="50" ry="11" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.4" transform="rotate(15,670,190)"/>
  <circle cx="658" cy="180" r="6" fill="#1d4ed8" opacity="0.5"/>
</g>
<text x="400" y="110" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#8b5cf6" letter-spacing="6" class="gp">&#9672; GITHUB ANALYTICS &#9672;</text>
<text x="400" y="148" text-anchor="middle" font-family="'Courier New',monospace" font-size="26" font-weight="bold" fill="url(#tg)" filter="url(#glow)" class="gp">Mission Control</text>
<text x="400" y="172" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#6366f1" letter-spacing="2" class="gp">charting the trajectory to AI Engineer</text>
<circle cx="400" cy="154" r="90" fill="none" stroke="rgba(139,92,246,0.12)" stroke-width="1" stroke-dasharray="4,6"/>
<circle cx="400" cy="154" r="130" fill="none" stroke="rgba(99,102,241,0.08)" stroke-width="1" stroke-dasharray="3,8"/>
<circle r="5" fill="#8b5cf6" class="o1"/>
<circle r="3" fill="#3b82f6" class="o2"/>
<text x="20" y="292" font-family="'Courier New',monospace" font-size="9" fill="#7c3aed" opacity="0.5">&#9698; SNEHAL.AI</text>
<text x="780" y="292" font-family="'Courier New',monospace" font-size="9" fill="#7c3aed" opacity="0.5" text-anchor="end">VIT.BHOPAL &#9699;</text>
<circle cx="290" cy="120" r="1" fill="white" class="tw9"/>
<circle cx="510" cy="100" r="1.5" fill="white" class="tw10"/>
<circle cx="310" cy="200" r="1" fill="white" class="tw7"/>
<circle cx="490" cy="210" r="1" fill="white" class="tw3"/>
</svg>
