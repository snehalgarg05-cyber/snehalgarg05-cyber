<svg width="900" height="160" viewBox="0 0 900 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Galaxy background gradient -->
    <radialGradient id="galaxyBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="40%" stop-color="#0d001f"/>
      <stop offset="100%" stop-color="#000010"/>
    </radialGradient>

    <!-- Glowing border gradient -->
    <linearGradient id="borderGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6">
        <animate attributeName="stop-color" values="#8b5cf6;#ec4899;#06b6d4;#8b5cf6" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#ec4899">
        <animate attributeName="stop-color" values="#ec4899;#06b6d4;#8b5cf6;#ec4899" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#06b6d4">
        <animate attributeName="stop-color" values="#06b6d4;#8b5cf6;#ec4899;#06b6d4" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Nebula glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="boxClip">
      <rect x="3" y="3" width="894" height="154" rx="16" ry="16"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="3" y="3" width="894" height="154" rx="16" ry="16" fill="url(#galaxyBg)"/>

  <!-- Nebula blobs -->
  <ellipse cx="150" cy="80" rx="120" ry="60" fill="#4c1d95" opacity="0.18">
    <animate attributeName="opacity" values="0.18;0.28;0.18" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="120;140;120" dur="6s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="750" cy="80" rx="130" ry="65" fill="#1e1b4b" opacity="0.22">
    <animate attributeName="opacity" values="0.22;0.32;0.22" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="130;150;130" dur="7s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="450" cy="40" rx="200" ry="40" fill="#701a75" opacity="0.1">
    <animate attributeName="opacity" values="0.1;0.18;0.1" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Stars -->
  <circle cx="50" cy="20" r="1" fill="white" opacity="0.8"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.1s" repeatCount="indefinite"/></circle>
  <circle cx="120" cy="45" r="1.2" fill="white" opacity="0.6"><animate attributeName="opacity" values="0.6;1;0.6" dur="1.7s" repeatCount="indefinite"/></circle>
  <circle cx="200" cy="15" r="0.8" fill="#a78bfa" opacity="0.9"><animate attributeName="opacity" values="0.9;0.3;0.9" dur="2.5s" repeatCount="indefinite"/></circle>
  <circle cx="300" cy="30" r="1" fill="white" opacity="0.7"><animate attributeName="opacity" values="0.7;0.1;0.7" dur="1.9s" repeatCount="indefinite"/></circle>
  <circle cx="380" cy="12" r="1.3" fill="#f0abfc" opacity="0.8"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="450" cy="25" r="0.9" fill="white" opacity="0.5"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.3s" repeatCount="indefinite"/></circle>
  <circle cx="530" cy="18" r="1.1" fill="#67e8f9" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.6s" repeatCount="indefinite"/></circle>
  <circle cx="620" cy="35" r="1" fill="white" opacity="0.6"><animate attributeName="opacity" values="0.6;0.9;0.6" dur="2.8s" repeatCount="indefinite"/></circle>
  <circle cx="700" cy="10" r="1.4" fill="#a78bfa" opacity="0.8"><animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/></circle>
  <circle cx="780" cy="28" r="0.8" fill="white" opacity="0.9"><animate attributeName="opacity" values="0.9;0.4;0.9" dur="1.8s" repeatCount="indefinite"/></circle>
  <circle cx="840" cy="15" r="1.2" fill="#f0abfc" opacity="0.6"><animate attributeName="opacity" values="0.6;1;0.6" dur="2.4s" repeatCount="indefinite"/></circle>
  <circle cx="880" cy="40" r="1" fill="white" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="3.1s" repeatCount="indefinite"/></circle>
  <circle cx="60" cy="130" r="1.1" fill="#67e8f9" opacity="0.7"><animate attributeName="opacity" values="0.7;0.1;0.7" dur="2.2s" repeatCount="indefinite"/></circle>
  <circle cx="160" cy="145" r="0.9" fill="white" opacity="0.5"><animate attributeName="opacity" values="0.5;0.9;0.5" dur="1.5s" repeatCount="indefinite"/></circle>
  <circle cx="260" cy="138" r="1" fill="#a78bfa" opacity="0.8"><animate attributeName="opacity" values="0.8;0.3;0.8" dur="2.7s" repeatCount="indefinite"/></circle>
  <circle cx="670" cy="140" r="1.2" fill="white" opacity="0.6"><animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/></circle>
  <circle cx="770" cy="148" r="0.8" fill="#f0abfc" opacity="0.9"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.9s" repeatCount="indefinite"/></circle>
  <circle cx="860" cy="135" r="1.3" fill="white" opacity="0.7"><animate attributeName="opacity" values="0.7;0.3;0.7" dur="2.6s" repeatCount="indefinite"/></circle>
  <circle cx="420" cy="145" r="1" fill="#67e8f9" opacity="0.6"><animate attributeName="opacity" values="0.6;1;0.6" dur="3.2s" repeatCount="indefinite"/></circle>
  <circle cx="550" cy="142" r="0.9" fill="white" opacity="0.8"><animate attributeName="opacity" values="0.8;0.1;0.8" dur="1.4s" repeatCount="indefinite"/></circle>

  <!-- Shooting star -->
  <line x1="100" y1="30" x2="160" y2="50" stroke="white" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;0;0.8;0" dur="6s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="x1" values="100;200" dur="6s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="x2" values="160;260" dur="6s" repeatCount="indefinite" begin="1s"/>
  </line>
  <line x1="600" y1="20" x2="660" y2="40" stroke="#a78bfa" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;0;0.7;0" dur="8s" repeatCount="indefinite" begin="4s"/>
    <animate attributeName="x1" values="600;700" dur="8s" repeatCount="indefinite" begin="4s"/>
    <animate attributeName="x2" values="660;760" dur="8s" repeatCount="indefinite" begin="4s"/>
  </line>

  <!-- Animated border -->
  <rect x="3" y="3" width="894" height="154" rx="16" ry="16"
        fill="none" stroke="url(#borderGlow)" stroke-width="2" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.5;0.9" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Inner subtle border -->
  <rect x="7" y="7" width="886" height="146" rx="13" ry="13"
        fill="none" stroke="#4c1d95" stroke-width="0.5" opacity="0.4"/>

  <!-- Quote mark left -->
  <text x="28" y="75" font-family="Georgia, serif" font-size="72" fill="#8b5cf6" opacity="0.25" filter="url(#softGlow)">"</text>

  <!-- Quote mark right -->
  <text x="840" y="115" font-family="Georgia, serif" font-size="72" fill="#8b5cf6" opacity="0.25" filter="url(#softGlow)">"</text>

  <!-- Main quote text -->
  <text x="450" y="72" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="15.5" font-style="italic" fill="#e2d9f3" filter="url(#glow)" letter-spacing="0.3">
    "The question of whether a computer can think is no more interesting
  </text>
  <text x="450" y="96" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="15.5" font-style="italic" fill="#e2d9f3" filter="url(#glow)" letter-spacing="0.3">
    than the question of whether a submarine can swim."
  </text>

  <!-- Author -->
  <text x="450" y="126" text-anchor="middle" font-family="'Fira Code', 'Courier New', monospace"
        font-size="13" font-weight="bold" fill="#a78bfa" filter="url(#glow)" letter-spacing="1">
    — Edsger W. Dijkstra
  </text>

  <!-- Corner sparkles -->
  <circle cx="30" cy="30" r="2" fill="#a78bfa" filter="url(#glow)" opacity="0.7">
    <animate attributeName="r" values="2;3.5;2" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="870" cy="30" r="2" fill="#ec4899" filter="url(#glow)" opacity="0.7">
    <animate attributeName="r" values="2;3.5;2" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="30" cy="130" r="2" fill="#06b6d4" filter="url(#glow)" opacity="0.7">
    <animate attributeName="r" values="2;3.5;2" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="870" cy="130" r="2" fill="#a78bfa" filter="url(#glow)" opacity="0.7">
    <animate attributeName="r" values="2;3.5;2" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
