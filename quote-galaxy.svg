<svg width="900" height="130" viewBox="0 0 900 130" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="galaxyBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="40%" stop-color="#0d001f"/>
      <stop offset="100%" stop-color="#000010"/>
    </radialGradient>
    <linearGradient id="borderGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6">
        <animate attributeName="stop-color" values="#8b5cf6;#ec4899;#06b6d4;#8b5cf6" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#ec4899">
        <animate attributeName="stop-color" values="#ec4899;#06b6d4;#8b5cf6;#ec4899" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#06b6d4">
        <animate attributeName="stop-color" values="#06b6d4;#8b5cf6;#ec4899;#06b6d4" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="3" y="3" width="894" height="124" rx="16" ry="16" fill="url(#galaxyBg)"/>

  <!-- Nebula blobs -->
  <ellipse cx="150" cy="65" rx="110" ry="50" fill="#4c1d95" opacity="0.18">
    <animate attributeName="opacity" values="0.18;0.28;0.18" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="110;130;110" dur="6s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="750" cy="65" rx="120" ry="52" fill="#1e1b4b" opacity="0.22">
    <animate attributeName="opacity" values="0.22;0.32;0.22" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="120;140;120" dur="7s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="450" cy="30" rx="200" ry="30" fill="#701a75" opacity="0.1">
    <animate attributeName="opacity" values="0.1;0.18;0.1" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Stars -->
  <circle cx="50" cy="18" r="1" fill="white" opacity="0.8"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.1s" repeatCount="indefinite"/></circle>
  <circle cx="120" cy="38" r="1.2" fill="white" opacity="0.6"><animate attributeName="opacity" values="0.6;1;0.6" dur="1.7s" repeatCount="indefinite"/></circle>
  <circle cx="200" cy="12" r="0.8" fill="#a78bfa" opacity="0.9"><animate attributeName="opacity" values="0.9;0.3;0.9" dur="2.5s" repeatCount="indefinite"/></circle>
  <circle cx="300" cy="22" r="1" fill="white" opacity="0.7"><animate attributeName="opacity" values="0.7;0.1;0.7" dur="1.9s" repeatCount="indefinite"/></circle>
  <circle cx="380" cy="10" r="1.1" fill="#f0abfc" opacity="0.8"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="450" cy="20" r="0.9" fill="white" opacity="0.5"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.3s" repeatCount="indefinite"/></circle>
  <circle cx="530" cy="14" r="1.1" fill="#67e8f9" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.6s" repeatCount="indefinite"/></circle>
  <circle cx="620" cy="28" r="1" fill="white" opacity="0.6"><animate attributeName="opacity" values="0.6;0.9;0.6" dur="2.8s" repeatCount="indefinite"/></circle>
  <circle cx="700" cy="8" r="1.3" fill="#a78bfa" opacity="0.8"><animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/></circle>
  <circle cx="780" cy="22" r="0.8" fill="white" opacity="0.9"><animate attributeName="opacity" values="0.9;0.4;0.9" dur="1.8s" repeatCount="indefinite"/></circle>
  <circle cx="840" cy="12" r="1.2" fill="#f0abfc" opacity="0.6"><animate attributeName="opacity" values="0.6;1;0.6" dur="2.4s" repeatCount="indefinite"/></circle>
  <circle cx="880" cy="35" r="1" fill="white" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="3.1s" repeatCount="indefinite"/></circle>
  <circle cx="60" cy="108" r="1.1" fill="#67e8f9" opacity="0.7"><animate attributeName="opacity" values="0.7;0.1;0.7" dur="2.2s" repeatCount="indefinite"/></circle>
  <circle cx="160" cy="118" r="0.9" fill="white" opacity="0.5"><animate attributeName="opacity" values="0.5;0.9;0.5" dur="1.5s" repeatCount="indefinite"/></circle>
  <circle cx="260" cy="112" r="1" fill="#a78bfa" opacity="0.8"><animate attributeName="opacity" values="0.8;0.3;0.8" dur="2.7s" repeatCount="indefinite"/></circle>
  <circle cx="670" cy="115" r="1.2" fill="white" opacity="0.6"><animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/></circle>
  <circle cx="770" cy="120" r="0.8" fill="#f0abfc" opacity="0.9"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.9s" repeatCount="indefinite"/></circle>
  <circle cx="860" cy="110" r="1.3" fill="white" opacity="0.7"><animate attributeName="opacity" values="0.7;0.3;0.7" dur="2.6s" repeatCount="indefinite"/></circle>
  <circle cx="420" cy="118" r="1" fill="#67e8f9" opacity="0.6"><animate attributeName="opacity" values="0.6;1;0.6" dur="3.2s" repeatCount="indefinite"/></circle>
  <circle cx="550" cy="115" r="0.9" fill="white" opacity="0.8"><animate attributeName="opacity" values="0.8;0.1;0.8" dur="1.4s" repeatCount="indefinite"/></circle>

  <!-- Shooting stars -->
  <line x1="100" y1="25" x2="155" y2="42" stroke="white" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;0;0.8;0" dur="6s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="x1" values="100;200" dur="6s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="x2" values="155;255" dur="6s" repeatCount="indefinite" begin="1s"/>
  </line>
  <line x1="600" y1="18" x2="650" y2="32" stroke="#a78bfa" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0;0;0.7;0" dur="8s" repeatCount="indefinite" begin="4s"/>
    <animate attributeName="x1" values="600;700" dur="8s" repeatCount="indefinite" begin="4s"/>
    <animate attributeName="x2" values="650;750" dur="8s" repeatCount="indefinite" begin="4s"/>
  </line>

  <!-- Animated border -->
  <rect x="3" y="3" width="894" height="124" rx="16" ry="16"
        fill="none" stroke="url(#borderGlow)" stroke-width="2" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.5;0.9" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Inner subtle border -->
  <rect x="7" y="7" width="886" height="116" rx="13" ry="13"
        fill="none" stroke="#4c1d95" stroke-width="0.5" opacity="0.4"/>

  <!-- Decorative quote marks -->
  <text x="26" y="62" font-family="Georgia, serif" font-size="58" fill="#8b5cf6" opacity="0.22" filter="url(#softGlow)">"</text>
  <text x="846" y="95" font-family="Georgia, serif" font-size="58" fill="#8b5cf6" opacity="0.22" filter="url(#softGlow)">"</text>

  <!-- Quote line 1 -->
  <text x="450" y="56" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="13" font-style="italic" fill="#e2d9f3" filter="url(#glow)" letter-spacing="0.3">
    "The question of whether a computer can think is no more interesting
  </text>
  <!-- Quote line 2 -->
  <text x="450" y="76" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="13" font-style="italic" fill="#e2d9f3" filter="url(#glow)" letter-spacing="0.3">
    than the question of whether a submarine can swim."
  </text>

  <!-- Author -->
  <text x="450" y="102" text-anchor="middle" font-family="'Fira Code', 'Courier New', monospace"
        font-size="11.5" font-weight="bold" fill="#a78bfa" filter="url(#glow)" letter-spacing="1.2">
    — Edsger W. Dijkstra
  </text>

  <!-- Corner sparkles -->
  <circle cx="28" cy="26" r="1.8" fill="#a78bfa" filter="url(#glow)" opacity="0.7">
    <animate attributeName="r" values="1.8;3;1.8" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="872" cy="26" r="1.8" fill="#ec4899" filter="url(#glow)" opacity="0.7">
    <animate attributeName="r" values="1.8;3;1.8" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="28" cy="104" r="1.8" fill="#06b6d4" filter="url(#glow)" opacity="0.7">
    <animate attributeName="r" values="1.8;3;1.8" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="872" cy="104" r="1.8" fill="#a78bfa" filter="url(#glow)" opacity="0.7">
    <animate attributeName="r" values="1.8;3;1.8" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
