<svg width="220" height="28" viewBox="0 0 220 28" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Profile Views</title>
  <desc>Animated color-cycling profile views badge</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6">
        <animate attributeName="stop-color" values="#8b5cf6;#ec4899;#00e5ff;#6366f1;#a855f7;#8b5cf6" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#ec4899">
        <animate attributeName="stop-color" values="#ec4899;#00e5ff;#6366f1;#a855f7;#8b5cf6;#ec4899" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#00e5ff">
        <animate attributeName="stop-color" values="#00e5ff;#6366f1;#a855f7;#8b5cf6;#ec4899;#00e5ff" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <!-- Left dark label section -->
  <rect width="130" height="28" rx="4" fill="#000000"/>
  <text x="65" y="18" text-anchor="middle" font-family="'Fira Code', monospace" font-size="11" font-weight="600" fill="#ffffff" letter-spacing="1.5">PROFILE VIEWS</text>

  <!-- Right animated color section -->
  <rect x="130" width="90" height="28" rx="0" fill="url(#bg)"/>
  <rect x="216" width="4" height="28" rx="4" fill="url(#bg)"/>
  <text x="175" y="18" text-anchor="middle" font-family="'Fira Code', monospace" font-size="11" font-weight="700" fill="#ffffff">LIVE ✦</text>
</svg>
